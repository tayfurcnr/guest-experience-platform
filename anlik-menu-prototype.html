<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anlık Menü — Platform Prototipi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#14201A;
  --ink-soft:#1F2D24;
  --ink-line: rgba(243,238,221,0.14);
  --chalk:#F3EEDD;
  --chalk-dim:#C9C2AC;
  --paper:#FBF8F2;
  --paper-line:#E4DECB;
  --paper-ink:#20241B;
  --gold:#D9A441;
  --gold-deep:#B9822C;
  --sauce:#C1432B;
  --sage:#6E8F63;
  --radius:10px;
  --font-display:'Bricolage Grotesque', serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--paper);
  color:var(--paper-ink);
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(circle at top left, rgba(217,164,65,.10), transparent 30%),
    radial-gradient(circle at 80% 10%, rgba(193,67,43,.08), transparent 24%),
    linear-gradient(to bottom, rgba(255,255,255,.38), rgba(255,255,255,0));
}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
h1,h2,h3,h4{font-family:var(--font-display);margin:0;letter-spacing:-0.01em;}
p{margin:0;}
input,select,textarea{font-family:inherit;}
::selection{background:rgba(217,164,65,.24);color:var(--ink);}

/* ---------- Route bar (mock browser chrome) ---------- */
.route-bar{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;gap:10px;
  background:var(--ink);color:var(--chalk);
  padding:9px 14px;
  border-bottom:1px solid var(--ink-line);
}
.route-bar-controls{display:flex;gap:4px;}
.rb-btn{
  background:transparent;border:1px solid var(--ink-line);color:var(--chalk-dim);
  width:26px;height:26px;border-radius:7px;font-size:13px;line-height:1;
}
.rb-btn:hover{color:var(--chalk);border-color:var(--chalk-dim);}
.route-bar-url{
  flex:1;
  background:var(--ink-soft);
  border:1px solid var(--ink-line);
  border-radius:20px;
  padding:6px 14px;
  font-family:var(--font-mono);
  font-size:12.5px;
  display:flex;align-items:center;gap:7px;
  color:var(--chalk-dim);
  overflow:hidden;white-space:nowrap;
}
.rb-lock{font-size:11px;opacity:.7;}
.rb-domain{color:var(--chalk);font-weight:600;}
.rb-path{color:var(--gold);}
.rb-home{
  width:26px;height:26px;border-radius:7px;border:1px solid var(--ink-line);
  display:flex;align-items:center;justify-content:center;color:var(--chalk-dim);font-size:14px;
}
.rb-home:hover{color:var(--gold);border-color:var(--gold);}

/* ---------- Layout helpers ---------- */
.page{max-width:1180px;margin:0 auto;padding:0 24px;}
.dark{background:var(--ink);color:var(--chalk);}
.section{padding:56px 0;}
.section-tight{padding:32px 0;}
.surface{
  background:#fff;
  border:1px solid var(--paper-line);
  border-radius:18px;
  box-shadow:0 12px 36px rgba(20,32,26,.06);
}
.eyebrow{
  font-family:var(--font-mono);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;display:block;
}
.muted{color:var(--chalk-dim);}
.paper .muted, .paper-ink-muted{color:#6b6656;}
.section-note{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  color:#8b8570;
}
.section-note span{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 10px;border-radius:999px;border:1px solid var(--paper-line);background:#fff;
}

/* ---------- Buttons / badges ---------- */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  border-radius:8px;border:1px solid transparent;
  padding:10px 18px;font-size:14px;font-weight:600;
  transition:transform .12s ease, opacity .12s ease;
}
.btn:active{transform:scale(.97);}
.btn-gold{background:var(--gold);color:var(--ink);}
.btn-gold:hover{background:var(--gold-deep);}
.btn-outline{border-color:var(--chalk-dim);color:var(--chalk);}
.btn-outline:hover{border-color:var(--chalk);}
.btn-outline-paper{border-color:var(--paper-line);color:var(--paper-ink);background:#fff;}
.btn-outline-paper:hover{border-color:var(--gold-deep);}
.btn-sauce{background:var(--sauce);color:#fff;}
.btn-sm{padding:6px 12px;font-size:12.5px;border-radius:6px;}
.btn-disabled{opacity:.45;cursor:not-allowed;}
.badge{
  font-family:var(--font-mono);font-size:11px;padding:3px 9px;border-radius:20px;
  display:inline-flex;align-items:center;gap:5px;font-weight:600;letter-spacing:.02em;
}
.badge-open{background:rgba(110,143,99,.15);color:var(--sage);}
.badge-closed{background:rgba(193,67,43,.13);color:var(--sauce);}
.badge-gold{background:rgba(217,164,65,.16);color:var(--gold-deep);}
.badge-line{border:1px solid var(--paper-line);color:#6b6656;background:#fff;}
.badge-dark{border:1px solid var(--ink-line);color:var(--chalk-dim);}

/* ---------- Home ---------- */
.hero-chalk{
  padding:70px 0 46px;
  background:
    radial-gradient(circle at 15% 20%, rgba(217,164,65,.10), transparent 40%),
    radial-gradient(circle at 85% 0%, rgba(193,67,43,.10), transparent 45%),
    var(--ink);
}
.hero-title{font-size:clamp(38px,6vw,64px);color:var(--chalk);line-height:1.02;max-width:720px;}
.hero-title em{color:var(--gold);font-style:normal;}
.hero-sub{margin-top:16px;max-width:520px;font-size:16.5px;color:var(--chalk-dim);line-height:1.55;}
.hero-grid{
  display:grid;
  grid-template-columns:minmax(0,1.1fr) minmax(290px,.9fr);
  gap:24px;
  align-items:end;
}
.hero-stats{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}
.stat-card{
  background:rgba(255,255,255,.04);
  border:1px solid var(--ink-line);
  border-radius:14px;
  padding:16px;
}
.stat-card strong{
  display:block;
  font-family:var(--font-display);
  font-size:22px;
  color:var(--chalk);
  margin-top:4px;
}
.stat-card span{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--chalk-dim);
}
.hero-summary{
  margin-top:18px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.hero-summary .badge{background:rgba(255,255,255,.05);}
.search-row{
  margin-top:34px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;
}
.search-box{
  flex:1;min-width:240px;
  background:var(--ink-soft);border:1px solid var(--ink-line);border-radius:10px;
  padding:13px 16px;color:var(--chalk);font-size:14.5px;
}
.search-box::placeholder{color:var(--chalk-dim);}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:20px;}
.chip{
  font-family:var(--font-mono);font-size:12.5px;padding:7px 14px;border-radius:20px;
  border:1px solid var(--ink-line);color:var(--chalk-dim);background:transparent;
}
.chip.active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:700;}
.chip:hover{border-color:var(--gold);}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:18px;}
.brand-card{
  background:var(--ink-soft);border:1px solid var(--ink-line);border-radius:14px;
  padding:20px;display:flex;flex-direction:column;gap:12px;transition:border-color .15s ease, transform .15s ease;
  position:relative;overflow:hidden;
}
.brand-card:hover{border-color:var(--gold);transform:translateY(-2px);}
.brand-card::after{
  content:'';
  position:absolute;inset:auto -18px -18px auto;
  width:110px;height:110px;border-radius:50%;
  background:radial-gradient(circle, rgba(217,164,65,.16), transparent 65%);
  pointer-events:none;
}
.brand-emoji{
  width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:22px;background:rgba(217,164,65,.14);
}
.brand-logo{
  width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:rgba(217,164,65,.14);font-size:22px;font-weight:700;flex-shrink:0;
}
.brand-logo img{width:100%;height:100%;object-fit:cover;display:block;}
.brand-card h3{color:var(--chalk);font-size:19px;}
.brand-card .cat{font-family:var(--font-mono);font-size:11.5px;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;}
.brand-card .tag{color:var(--chalk-dim);font-size:13.5px;line-height:1.45;flex:1;}
.brand-card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:4px;}

.section-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.section-head h2{font-size:26px;}
.section-head .muted{font-size:13.5px;}
.section-title{display:flex;flex-direction:column;gap:4px;}
.section-subtitle{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:#8b8570;
}

/* ---------- Brand page ---------- */
.brand-hero{
  padding:52px 0 38px;background:var(--ink);
  border-bottom:1px solid var(--ink-line);
}
.brand-hero-top{display:flex;gap:18px;align-items:center;}
.brand-hero-icon{
  width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;
  font-size:30px;background:rgba(217,164,65,.15);border:1px solid var(--ink-line);
}
.brand-hero-icon img{width:100%;height:100%;object-fit:cover;display:block;border-radius:16px;}
.branch-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:26px;}
.branch-card{
  background:var(--paper);border:1px solid var(--paper-line);border-radius:14px;padding:20px;
  display:flex;flex-direction:column;gap:10px;
}
.branch-card h4{font-size:17px;}
.branch-card .addr{font-size:13px;color:#6b6656;line-height:1.5;}
.branch-card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.back-link{font-family:var(--font-mono);font-size:12.5px;color:var(--chalk-dim);display:inline-flex;gap:6px;align-items:center;margin-bottom:18px;}
.back-link:hover{color:var(--gold);}
.branch-meta{
  display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;
}
.branch-meta .badge{background:rgba(255,255,255,.05);}

/* ---------- Branch / QR menu ---------- */
.campaign-banner{
  background:var(--brand-accent, var(--sauce));color:#fff;padding:10px 0;overflow:hidden;
}
.campaign-banner .page{display:flex;align-items:center;gap:10px;}
.campaign-banner-shell{display:flex;align-items:center;gap:10px;min-width:0;width:100%;}
.campaign-banner-label{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  white-space:nowrap;flex-shrink:0;opacity:.95;
}
.campaign-banner-track-wrap{overflow:hidden;min-width:0;flex:1;}
.campaign-banner-track{
  display:flex;align-items:center;gap:28px;white-space:nowrap;
  animation:campaignMarquee 22s linear infinite;
  will-change:transform;
}
.campaign-banner-item{
  display:inline-flex;align-items:center;gap:8px;white-space:nowrap;flex-shrink:0;
}
.campaign-banner-dot{width:6px;height:6px;border-radius:999px;background:rgba(255,255,255,.8);display:inline-block;flex-shrink:0;}
@keyframes campaignMarquee{
  from{transform:translateX(0);}
  to{transform:translateX(-50%);}
}
.branch-topbar{background:var(--ink);padding:26px 0 20px;position:sticky;top:45px;z-index:30;border-bottom:1px solid var(--ink-line);}
.branch-topbar h2{color:var(--chalk);font-size:22px;}
.branch-header-row{
  display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;
}
.branch-quickinfo{
  display:flex;gap:8px;flex-wrap:wrap;
  margin-top:12px;
}
.branch-quickinfo .badge{background:rgba(255,255,255,.05);}
.tabs{display:flex;gap:6px;margin-top:16px;overflow-x:auto;padding-bottom:2px;}
.tab{
  font-family:var(--font-mono);font-size:12.5px;padding:8px 15px;border-radius:20px;white-space:nowrap;
  border:1px solid var(--ink-line);color:var(--chalk-dim);
}
.tab.active{background:var(--brand-accent, var(--chalk));color:var(--ink);border-color:var(--brand-accent, var(--chalk));font-weight:700;}
.menu-search{
  margin-top:14px;width:100%;background:var(--ink-soft);border:1px solid var(--ink-line);
  border-radius:8px;padding:10px 14px;color:var(--chalk);font-size:13.5px;
}
.menu-search:focus{outline:2px solid var(--brand-accent, var(--gold));outline-offset:1px;}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;margin:30px 0;}
.menu-category-block{margin:0 0 28px;}
.menu-category-block .product-grid{margin:0;}
.menu-category-head{
  display:flex;justify-content:space-between;align-items:flex-end;gap:10px;flex-wrap:wrap;
  margin-bottom:12px;
}
.menu-category-head h3{font-size:21px;line-height:1.1;color:var(--paper-ink);}
.menu-category-head .badge{align-self:flex-start;}
.product-card{
  background:#fff;border:1px solid var(--paper-line);border-radius:14px;overflow:hidden;
  display:flex;flex-direction:column;transition:transform .15s ease, box-shadow .15s ease;
  position:relative;
}
.product-card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(20,32,26,.08);}
.product-card::before{
  content:'';
  position:absolute;inset:0 0 auto 0;height:3px;
  background:linear-gradient(90deg, var(--brand-accent, var(--gold)), rgba(193,67,43,.7));
}
.product-thumb{
  height:110px;display:flex;align-items:center;justify-content:center;font-size:38px;
  background:linear-gradient(135deg, rgba(217,164,65,.18), rgba(193,67,43,.10));
}
.product-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.product-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1;}
.product-body h4{font-size:15.5px;}
.product-body .desc{font-size:12.5px;color:#6b6656;line-height:1.45;min-height:34px;}
.product-foot{display:flex;justify-content:space-between;align-items:center;margin-top:auto;}
.price{font-family:var(--font-mono);font-weight:700;font-size:15px;}
.allergen-row{display:flex;gap:5px;flex-wrap:wrap;}

.sticky-cta{
  position:sticky;bottom:0;background:var(--ink);border-top:1px solid var(--ink-line);
  padding:14px 0;
}
.sticky-cta .page{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(20,32,26,.55);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;
}
.modal{
  background:#fff;border-radius:16px;max-width:460px;width:100%;overflow:hidden;
  max-height:88vh;overflow-y:auto;
}
.modal-grid{display:grid;grid-template-columns:1fr;gap:14px;}
.modal-hero{height:150px;display:flex;align-items:center;justify-content:center;font-size:56px;
  background:linear-gradient(135deg, rgba(217,164,65,.22), rgba(193,67,43,.12));}
.modal-body{padding:22px 24px 26px;}
.modal-close{
  position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.85);border:none;font-size:16px;
}
.modal-rel{position:relative;}
.detail-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--paper-line);font-size:13.5px;}
.detail-row:last-child{border-bottom:none;}

/* ---------- Admin layout ---------- */
.admin-shell{background:var(--paper);min-height:60vh;}
.admin-header{
  background:var(--ink);color:var(--chalk);padding:26px 0;
}
.admin-header .page{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.role-pill{
  font-family:var(--font-mono);font-size:11px;border:1px solid var(--ink-line);color:var(--chalk-dim);
  padding:5px 12px;border-radius:20px;
}
.admin-layout{display:flex;gap:28px;padding:30px 0 70px;align-items:flex-start;}
.sidebar{
  width:210px;flex-shrink:0;background:#fff;border:1px solid var(--paper-line);border-radius:14px;
  padding:12px;position:sticky;top:56px;
}
.sidebar-item{
  display:block;padding:10px 12px;border-radius:8px;font-size:13.5px;font-weight:600;color:#6b6656;margin-bottom:2px;
}
.sidebar-item.active{background:var(--ink);color:var(--chalk);}
.sidebar-item:hover:not(.active){background:var(--paper);color:var(--paper-ink);}
.admin-main{flex:1;min-width:0;}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:26px;}
.kpi-card{background:#fff;border:1px solid var(--paper-line);border-radius:14px;padding:18px;}
.kpi-card .kpi-label{font-family:var(--font-mono);font-size:11px;color:#8b8570;text-transform:uppercase;letter-spacing:.05em;}
.kpi-card .kpi-value{font-family:var(--font-display);font-size:26px;margin-top:6px;}
.kpi-card .kpi-trend{font-size:12px;margin-top:4px;font-weight:600;}
.kpi-up{color:var(--sage);}
.kpi-down{color:var(--sauce);}

.panel{background:#fff;border:1px solid var(--paper-line);border-radius:14px;padding:22px;margin-bottom:18px;}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.panel-head h3{font-size:17px;}
.panel-title{display:flex;flex-direction:column;gap:4px;}
.panel-subtitle{
  font-family:var(--font-mono);
  font-size:10.5px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:#8b8570;
}

table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{
  text-align:left;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.04em;
  color:#8b8570;padding:8px 10px;border-bottom:1px solid var(--paper-line);
}
td{padding:10px 10px;border-bottom:1px solid var(--paper-line);}
tr:last-child td{border-bottom:none;}
.row-actions{display:flex;gap:6px;}

.switch{
  width:38px;height:22px;border-radius:20px;position:relative;border:none;background:var(--paper-line);flex-shrink:0;
}
.switch.on{background:var(--sage);}
.switch::after{
  content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;
  transition:left .15s ease;
}
.switch.on::after{left:18px;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field{display:flex;flex-direction:column;gap:6px;font-size:13px;}
.field label{font-weight:600;color:#4a4636;}
.field input, .field select, .field textarea{
  border:1px solid var(--paper-line);border-radius:8px;padding:10px 12px;font-size:13.5px;background:var(--paper);
}
.field input:focus, .field select:focus{outline:2px solid var(--gold);outline-offset:1px;}
.image-preview{
  min-height:120px;border:1px dashed var(--paper-line);border-radius:10px;background:#fff;
  display:flex;align-items:center;justify-content:center;overflow:hidden;color:#8b8570;font-size:12.5px;
}
.image-preview img{width:100%;height:100%;object-fit:cover;display:block;}

.wizard-steps{display:flex;gap:6px;margin-bottom:24px;}
.wstep{
  flex:1;text-align:center;padding:10px 6px;border-radius:8px;font-family:var(--font-mono);font-size:11.5px;
  background:var(--paper);border:1px solid var(--paper-line);color:#8b8570;
}
.wstep.on{background:var(--ink);color:var(--chalk);border-color:var(--ink);font-weight:700;}
.wstep.done{background:rgba(110,143,99,.15);color:var(--sage);border-color:transparent;}

.swatches{display:flex;gap:10px;flex-wrap:wrap;}
.swatch{
  width:34px;height:34px;border-radius:9px;border:2px solid transparent;cursor:pointer;
}
.swatch.sel{border-color:var(--ink);}

.toast{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--chalk);padding:12px 22px;border-radius:30px;
  font-size:13.5px;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.25);
  display:flex;align-items:center;gap:8px;
}
.campaign-popup{
  position:fixed;inset:0;z-index:180;
  background:rgba(20,32,26,.42);

function findBrand(slug){ return BRANDS.find(b=>b.slug===slug); }
function findBranch(brand, slug){ return brand ? brand.branches.find(x=>x.slug===slug) : null; }
function slugify(s){
  return (s||'').toLowerCase()
    .replace(/ç/g,'c').replace(/ğ/g,'g').replace(/ı/g,'i').replace(/ö/g,'o').replace(/ş/g,'s').replace(/ü/g,'u')
    .replace(/[^a-z0-9]+/g,'')
    .slice(0,24);
}
function fmt(n){ return n.toLocaleString('tr-TR')+' ₺'; }
function escapeHtml(s){
  return String(s ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
function renderBrandLogo(brand, cls='brand-logo', alt=brand.name){
  const logo = (brand.logo || '').trim();
  const fallback = escapeHtml(brand.emoji || '🍽️');
  if(!logo) return `<div class="${cls}">${fallback}</div>`;
  if(/^https?:\/\//.test(logo) || logo.startsWith('data:')){
    return `<div class="${cls}"><img src="${escapeHtml(logo)}" alt="${escapeHtml(alt)}"></div>`;
  }
  return `<div class="${cls}">${escapeHtml(logo)}</div>`;
}
function discountPercent(originalPrice, salePrice){
  const op = Number(originalPrice);
  const sp = Number(salePrice);
  if(!op || !sp || op <= sp) return 0;
  return Math.max(1, Math.round(((op - sp) / op) * 100));
}
function productPromoLabel(p){
  if(p?.featured) return 'Günün Ürünü';
  const campaign = (p?.campaign || '').trim();
  if(campaign) return campaign;
  const pct = discountPercent(p?.originalPrice, p?.price);
  return pct > 0 ? `%${pct} indirim` : '';
}
const ROLE_PERMISSION_PRESETS = {
  'Restaurant Owner': ['manage_branches','manage_menu','manage_campaigns','manage_staff','view_analytics','manage_theme'],
  'Branch Manager': ['manage_menu','manage_campaigns','view_analytics'],
  'Garson': ['view_menu','manage_table_notes'],
  'Kasiyer': ['view_menu','manage_payments']
};
const PERMISSION_LABELS = {
  manage_branches:'Şube yönetimi',
  manage_menu:'Menü yönetimi',
  manage_campaigns:'Kampanya yönetimi',
  manage_staff:'Yetkili hesaplar',

  manage_theme:'Tema / logo',
  view_menu:'Menü görüntüleme',
  manage_table_notes:'Masa notları',
  manage_payments:'Tahsilat'
};
const PERMISSION_ORDER = ['manage_branches','manage_menu','manage_campaigns','manage_staff','view_analytics','manage_theme','view_menu','manage_table_notes','manage_payments'];
function defaultPermissionsForRole(role){
  return [...(ROLE_PERMISSION_PRESETS[role] || [])];
}
function permissionLabel(key){ return PERMISSION_LABELS[key] || key; }
function permissionBadges(perms){
  const list = (perms || []).map(permissionLabel);
  return list.length ? list.map(p=>`<span class="badge badge-line">${p}</span>`).join('') : '<span class="muted">İzin yok</span>';
}
function hasPermission(person, perm){
  return Array.isArray(person?.permissions) && person.permissions.includes(perm);
}
function parseTimeToMinutes(text){
  const m = String(text || '').trim().match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return null;
  const h = Math.max(0, Math.min(23, parseInt(m[1], 10)));
  const min = Math.max(0, Math.min(59, parseInt(m[2], 10)));
  return h * 60 + min;
}
function parseCampaignWindow(text){
  if(!text) return null;
  const raw = String(text).replace(/–/g,'-').replace(/\s+/g,'').trim();
  const parts = raw.split('-');
  if(parts.length !== 2) return null;
  const start = parseTimeToMinutes(parts[0]);
  const end = parseTimeToMinutes(parts[1]);
  if(start === null || end === null) return null;
  return {start, end};
}
function minutesNow(){
  const now = new Date();
  return now.getHours() * 60 + now.getMinutes();
}
function isCampaignActiveNow(campaign, mins){
  if(!campaign || campaign.active === false) return false;
  const window = parseCampaignWindow(campaign.window);
  if(!window) return true;
  if(window.start === window.end) return true;
  if(window.start < window.end) return mins >= window.start && mins < window.end;
  return mins >= window.start || mins < window.end;
}
function currentCampaigns(branch){
  const now = minutesNow();
  return branch.campaigns.filter(c => isCampaignActiveNow(c, now));
}
function campaignKey(branchKey, campaign){
  return branchKey + '::' + (campaign.window || campaign.name);
}
function campaignWindowLabel(campaign){
  return campaign.window ? campaign.window.replace('-', ' – ') : 'Tüm gün';
}
function campaignBannerText(campaign, count, index){
  const prefix = count > 1 ? `${index + 1}/${count} · ` : '';
  return `${prefix}${campaign.name} — ${campaign.detail}${campaign.window ? ` · ${campaignWindowLabel(campaign)}` : ''}`;
}
function dismissCampaignPopup(){
  UI.activeCampaignPopup = null;
  render();
}
function renderCampaignPopup(){
  const popup = UI.activeCampaignPopup;
  if(!popup) return '';
  const brand = findBrand(popup.bs);
  const branch = findBranch(brand, popup.brs);
  if(!brand || !branch) return '';
  const campaign = branch.campaigns[popup.idx];
  if(!campaign) return '';
  return `
  <div class="campaign-popup" style="--brand-accent:${brand.accent};" onclick="if(event.target===this) dismissCampaignPopup()">
    <div class="campaign-popup-card">
      <button class="campaign-popup-close" onclick="dismissCampaignPopup()">✕</button>
      <span class="campaign-popup-eyebrow">Sınırlı zamanlı kampanya</span>
      <h3>${campaign.name}</h3>
      <p>${campaign.detail}</p>
      <div class="campaign-popup-meta">
        <span class="badge badge-dark">${brand.name}</span>
        <span class="badge badge-dark">${branch.name}</span>
        <span class="badge badge-gold">${campaignWindowLabel(campaign)}</span>
      </div>
      <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-gold btn-sm" onclick="dismissCampaignPopup()">Menüye Dön</button>
      </div>
    </div>
  </div>`;
}
function campaignTickerHtml(campaigns, key){
  if(!campaigns.length) return '';
  const items = campaigns.map((campaign, idx)=>`
    <span class="campaign-banner-item">
      <span class="campaign-banner-dot"></span>
      <span>${campaignBannerText(campaign, campaigns.length, idx)}</span>
    </span>`).join('');
  return `
    <div class="campaign-banner">
      <div class="page">
        <div class="campaign-banner-shell">
          <span class="campaign-banner-label">📣 Kampanyalar</span>
          <div class="campaign-banner-track-wrap">
            <div class="campaign-banner-track">
              ${items}
              ${items}
            </div>
          </div>
        </div>
      </div>
    </div>`;
}
function syncCampaignExperience(){
  const raw = decodeURIComponent(location.hash.replace(/^#\/?/, ''));
  const segs = raw.split('/').filter(Boolean);
  if(!(segs.length === 2)){
    UI.activeCampaignPopup = null;
    UI.campaignPopupRouteKey = '';
    return;
  }
  const brand = findBrand(segs[0]);
  const branch = findBranch(brand, segs[1]);
  if(!brand || !branch){
    UI.activeCampaignPopup = null;
    UI.campaignPopupRouteKey = '';
    return;
  }
  const key = branchKey(segs[0], segs[1]);
  const campaigns = currentCampaigns(branch);
  const bannerHost = document.getElementById('campaignBannerHost');
  if(bannerHost){
    bannerHost.innerHTML = campaignTickerHtml(campaigns, key);
  }
  if(!UI.activeProduct){
    if(UI.campaignPopupRouteKey !== key){
      const eligiblePopup = campaigns.find(c => c.popup !== false);
      if(eligiblePopup){
        UI.activeCampaignPopup = {bs: segs[0], brs: segs[1], idx: branch.campaigns.indexOf(eligiblePopup)};
        UI.campaignPopupRouteKey = key;
        UI.campaignPopupSeen[campaignKey(key, eligiblePopup)] = eligiblePopup.window || 'all-day';
      } else {
        UI.activeCampaignPopup = null;
        UI.campaignPopupRouteKey = key;
      }
    }
  }
}
function startCampaignTicker(){
  if(window.__campaignTickerStarted) return;
  window.__campaignTickerStarted = true;
  setInterval(()=>syncCampaignExperience(), 3500);
}

function branchKey(bs,brs){ return bs+'::'+brs; }

function productsHtml(brand, branch){
  const key = branchKey(brand.slug, branch.slug);
  const activeCat = UI.activeTab[key] || 'Tümü';
  const q = (UI.menuQuery[key]||'').trim().toLowerCase();
  function priceMarkup(p){
    const sale = fmt(p.price);
    const original = p.originalPrice && p.originalPrice > p.price ? fmt(p.originalPrice) : '';
    const pct = discountPercent(p.originalPrice, p.price);
    return original ? `<span style="display:flex;flex-direction:column;align-items:flex-start;line-height:1.05;gap:2px;"><span style="font-size:12px;color:#8b8570;text-decoration:line-through;">${original}</span><span class="price">${sale}</span>${pct ? `<span class="badge badge-gold" style="margin-top:2px;">%${pct} indirim</span>` : ''}</span>` : `<span class="price">${sale}</span>`;
  }
  const renderCard = (p, ci, pi) => `
    <div class="product-card" onclick="openProduct('${brand.slug}','${branch.slug}',${ci},${pi})">
      <div class="product-thumb">${p.image ? `<img src="${escapeHtml(p.image)}" alt="${escapeHtml(p.name)}">` : (p.emoji||brand.emoji)}</div>
      <div class="product-body">
        <div style="display:flex;justify-content:space-between;gap:8px;">
          <h4>${p.name}</h4>
          ${productPromoLabel(p) ? `<span class="badge badge-gold" style="white-space:nowrap;">${productPromoLabel(p)}</span>` : ''}
        </div>
        <p class="desc">${p.desc}</p>
        <div class="allergen-row">
          ${p.allergens.map(a=>`<span class="badge badge-line">${a}</span>`).join('')}
          <span class="badge badge-line">${p.kcal} kcal</span>
        </div>
        <div class="product-foot">
          ${priceMarkup(p)}
          <span class="muted" style="font-size:12px;">Detay →</span>
        </div>
      </div>
    </div>`;
  let sections = [];
  branch.categories.forEach((c,ci)=>{
    if(activeCat !== 'Tümü' && c.name!==activeCat) return;
    const cards = c.products.flatMap((p,pi)=>{
      if(q && !p.name.toLowerCase().includes(q)) return [];
      return [renderCard(p,ci,pi)];
    });
    if(!cards.length) return;
    sections.push(`
      <div class="menu-category-block">
        <div class="menu-category-head">
          <div class="section-title">
            <span class="section-subtitle">${c.name}</span>
            <h3>${c.name}</h3>
          </div>
          <span class="badge badge-line">${cards.length} ürün</span>
        </div>
        <div class="product-grid">${cards.join('')}</div>
      </div>`);
  });
  if(!sections.length) return `<div class="empty-state"><strong>Sonuç bulunamadı</strong>Bu kategoride aramanla eşleşen ürün yok.</div>`;
  return sections.join('');
}

function updateProduct(bs,brs,ci,pi){
  const branch = findBranch(findBrand(bs),brs);
  const f = UI.productForm;
  const name = (f.name || '').trim();
  const price = parseFloat(f.price)||0;
  const originalPrice = parseFloat(f.originalPrice)||0;
  const catName = (f.category || '').trim();
  const kcal = parseInt(f.kcal)||0;
  const allergens = (f.allergens || '').trim();
  const desc = (f.desc || '').trim() || 'Ürün açıklaması.';
  const campaignStart = (f.campaignStart || '').trim();
  const campaignEnd = (f.campaignEnd || '').trim();
  if(!name || !price){ UI.toast='Ürün adı ve fiyat zorunlu.'; render(); return; }
  const current = branch.categories[ci].products[pi];
  const targetCatIndex = branch.categories.findIndex(c=>c.name===catName);
  const nextCatIndex = targetCatIndex >= 0 ? targetCatIndex : ci;
  const updated = {
    ...current,
    emoji: f.emoji || current.emoji || '🍽️',
    name,
    price,
    originalPrice: originalPrice > 0 ? originalPrice : (current.originalPrice || price),
    kcal,
    allergens: allergens ? allergens.split(',').map(s=>s.trim()) : ['—'],
    desc,
    campaign: (f.campaignLabel || '').trim(),
    campaignStart,
    campaignEnd,
    featured: !!f.featured,
    image: f.image || ''
  };
  if(nextCatIndex === ci){
    branch.categories[ci].products[pi] = updated;
  } else {
    branch.categories[ci].products.splice(pi,1);
    branch.categories[nextCatIndex].products.push(updated);
  }
  UI.showAddProduct=false;
  UI.productForm = {mode:'create', bs:'', brs:'', ci:null, pi:null, name:'', price:'', originalPrice:'', category:'', kcal:'', allergens:'', desc:'', emoji:'🍽️', campaignLabel:'', campaignStart:'', campaignEnd:'', featured:false, image:'', imageType:'url'};
  UI.toast='Ürün güncellendi: '+name;
  render();
}

}

function toggleCampaign(bs,brs,idx){
  const branch = findBranch(findBrand(bs),brs);
  branch.campaigns[idx].active = !branch.campaigns[idx].active;
  render();
}
function addCampaign(bs,brs){
  const name = prompt('Kampanya adı:'); if(!name) return;
  const detail = prompt('Kampanya açıklaması:') || '';
  const window = prompt('Saat aralığı (örn. 11:00-15:00, boş bırakılırsa tüm gün):') || '';
  const popup = confirm('Bu kampanya popup olarak da gösterilsin mi?');
  const branch = findBranch(findBrand(bs),brs);
  branch.campaigns.push({name, detail, active:true, window:window.trim(), popup});
  UI.toast='Kampanya eklendi: '+name; render();
}
function campaignsPanel(bs,brs,branch){
  return `<div class="panel">
    <div class="panel-head"><div class="panel-title"><span class="panel-subtitle">Zamanlı içerik</span><h3>Kampanyalar & Duyurular</h3></div><button class="btn btn-gold btn-sm" onclick="addCampaign('${bs}','${brs}')">+ Kampanya Ekle</button></div>
    ${branch.campaigns.length? branch.campaigns.map((c,idx)=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--paper-line);">
        <div>

}

function renderBranchAdmin(bs,brs){
  const brand = findBrand(bs); const branch = findBranch(brand,brs);

function setBrandLogo(bs){
  const brand = findBrand(bs);

  if(logo === null) return;
  brand.logo = logo.trim();

function ownerStaffField(k, v){
  UI.ownerStaffForm[k] = v;
  if(k === 'role'){
    UI.ownerStaffForm.permissions = defaultPermissionsForRole(v);
  }
}
function ownerTogglePermission(perm){
  const current = UI.ownerStaffForm.permissions || [];
  UI.ownerStaffForm.permissions = current.includes(perm)
    ? current.filter(p => p !== perm)
    : [...current, perm];
}
function ownerAddStaff(bs){
  const brand = findBrand(bs);
  if(!brand) return;
  const f = UI.ownerStaffForm;
  const name = f.name.trim();
  const role = f.role.trim() || 'Branch Manager';
  const branch = f.branch.trim() || (brand.branches[0] ? brand.branches[0].name : '');
  const permissions = Array.isArray(f.permissions) && f.permissions.length ? [...f.permissions] : defaultPermissionsForRole(role);
  if(!name){
    UI.toast = 'Yetkili adı zorunlu.';
    render();
    return;
  }
  brand.staff = brand.staff || [];
  brand.staff.push({name, role, branch, permissions});
  UI.ownerStaffForm = {name:'', role:'Branch Manager', branch:'', permissions:defaultPermissionsForRole('Branch Manager')};
  UI.toast = 'Yetkili hesap eklendi: ' + name;
  render();
}
function ownerDeleteStaff(bs, idx){
  const brand = findBrand(bs);

}

function wizardGo(step){ UI.wizardStep = step; render(); }
function wizardField(k,v){ UI.wizardData[k]=v; if(k==='name') UI.wizardData.slug = slugify(v); }
function wizardCreate(){
  const d = UI.wizardData;
  if(!d.name){ UI.toast='Marka adı zorunlu.'; UI.wizardStep=1; render(); return; }
  const catKey = d.category.includes('Kebap')?'grill' : d.category.includes('Deniz')?'seafood' : d.category.includes('İtalyan')?'italian' : d.category.includes('Kahve')?'cafe':'general';
  BRANDS.push({
    slug: d.slug || slugify(d.name)+Date.now(),
    name: d.name, category: d.category, accent:'#D9A441', emoji:'🏠', logo:d.logo || '🏠', staff:[],
    tagline: d.tagline || 'Anlık Menü ile yayında.',
    branches:[{slug:slugify(d.branchName||'merkez')||'merkez', name:d.branchName||'Merkez Şube', address:d.branchAddress||'—', hours:d.branchHours, status:'open', categories:cloneCats(MENU_TEMPLATES[catKey]), campaigns:[]}]
  });
  UI.toast = 'Mağaza oluşturuldu: '+d.name;
  UI.wizardData = {name:'', category:'Izgara & Kebap', tagline:'', logo:'', branchName:'', branchAddress:'', branchHours:'10:00 – 22:00', slug:''};
  UI.wizardStep = 1; UI.adminTab='stores';
  render();
}

  if(s===1){
    stepBody = `<div class="form-grid">
      <div class="field"><label>Marka Adı</label><input value="${d.name}" onchange="wizardField('name',this.value)" placeholder="örn. Zeytin Sofrası"></div>
      <div class="field"><label>Kategori</label><select onchange="wizardField('category',this.value)">

      <div class="field" style="grid-column:1/-1;"><label>Tanıtım Cümlesi</label><input value="${d.tagline}" onchange="wizardField('tagline',this.value)" placeholder="Kısa marka sloganı"></div>

  } else if(s===2){
    stepBody = `<div class="form-grid">
      <div class="field"><label>Şube Adı</label><input value="${d.branchName}" onchange="wizardField('branchName',this.value)" placeholder="örn. Kadıköy"></div>

    </div>`;
  } else if(s===3){
    stepBody = `<div class="field" style="max-width:360px;">
      <label>Route Slug (otomatik önerilir, düzenlenebilir)</label>
      <input value="${d.slug || slugify(d.name)}" onchange="wizardField('slug',this.value)">

    </div>`;
  } else {
    stepBody = `
      <div class="detail-row"><span>Marka</span><strong>${d.name||'—'}</strong></div>
      <div class="detail-row"><span>Kategori</span><span>${d.category}</span></div>
      <div class="detail-row"><span>Logo</span><span>${d.logo||'—'}</span></div>
      <div class="detail-row"><span>İlk Şube</span><span>${d.branchName||'Merkez Şube'}</span></div>
      <div class="detail-row"><span>Adres</span><span>${d.branchAddress||'—'}</span></div>
      <div class="detail-row"><span>Route</span><span style="font-family:var(--font-mono);">/${d.slug||slugify(d.name)}</span></div>
      <p class="muted" style="margin-top:14px;font-size:12.5px;color:#6b6656;">Oluştur’a bastığında sistem otomatik olarak marka sayfasını, varsayılan admin alanını ve ilk şube QR menüsünü türetir.</p>
    `;
  }
  return `<div class="panel">
    <div class="panel-head"><div class="panel-title"><span class="panel-subtitle">Kurulum akışı</span><h3>Yeni Mağaza Ekle</h3></div></div>

             : `<button class="btn btn-gold btn-sm" onclick="wizardCreate()">Mağazayı Oluştur</button>`}
    </div>
  </div>`;

function render(){
  const app = document.getElementById('app');
  const raw = decodeURIComponent(location.hash.replace(/^#\/?/, ''));
  const segs = raw.split('/').filter(Boolean);
  let html = routeBar(segs);
  if(segs.length===0) html += renderHome();
  else if(segs.length===1 && segs[0]==='Admin') html += renderPlatformAdmin();
  else if(segs.length===1) html += renderBrandPage(segs[0]);
  else if(segs.length===2 && segs[1]==='Admin') html += renderOwnerAdmin(segs[0]);
  else if(segs.length===2) html += renderBranchPage(segs[0], segs[1]);
  else if(segs.length===3 && segs[2]==='Admin') html += renderBranchAdmin(segs[0], segs[1]);
  else html += renderNotFound();
  app.innerHTML = html;
  syncCampaignExperience();
  if(UI.activeProduct) app.insertAdjacentHTML('beforeend', renderProductModal());
  if(UI.activeCampaignPopup) app.insertAdjacentHTML('beforeend', renderCampaignPopup());
  if(UI.toast){ const m=UI.toast; app.insertAdjacentHTML('beforeend', renderToast(m)); setTimeout(()=>{ if(UI.toast===m){UI.toast=null; render();} }, 2400); }
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);
startCampaignTicker();
</script>
</body>
</html>
